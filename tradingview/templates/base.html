#chart {
    height: 90%;
    min-width: 95%;
    margin:auto;
    opacity: 0.9;
  }
  
  #timeline-chart .apexcharts-toolbar {
    opacity: 1;
    border: 0;
  }



  .arrow_box {
    /* position: relative; */
    background: #555;
    border: 2px solid #000000;
  }
  .arrow_box:after, .arrow_box:before {
    right: 100%;
    top: 50%;
    border: solid transparent;
    content: " ";
    height: 0;
    width: 0;
    /* position: absolute; */
    pointer-events: none;
  }
  
  .arrow_box:after {
    border-color: rgba(85, 85, 85, 0);
    border-right-color: #555;
    border-width: 10px;
    margin-top: -10px;
  }
  .arrow_box:before {
    border-color: rgba(0, 0, 0, 0);
    border-right-color: #000000;
    border-width: 13px;
    margin-top: -13px;
  }
  
  #chart .apexcharts-tooltip {
    color: #ffffff;
    transform: translateX(10px) translateY(10px);
    overflow: visible !important;
    white-space: normal !important;
  }
  
  #chart .apexcharts-tooltip span {
    padding: 5px 10px;
    display: inline-block;
  }




  .analog-clock {
    width: 310px;
    height: 310px;
    background: #343a40;
    border-radius: 3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  
  .digital-time {
    font-family: "Poppins", Arial, Helvetica, sans-serif;
    font-size: 2rem;
    font-weight: 500;
    color: #f1f3f5;
    padding: 1rem;
  }
  
  .display {
    width: 90%;
    height: 90%;
    border-radius: 50%;
    background-color: #212529;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0px 4px 8px 4px rgba(0, 0, 0, 0.1);
    border: 1rem solid #495057;
  }
  
  .handbase {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #343a40;
    position: absolute;
    box-shadow: 1px 1px 1px rgba(0, 0, 0, 0.2);
  }
  
  .handbase::before {
    content: "";
    width: 8px;
    background: inherit;
    display: block;
    left: 50%;
    border-radius: 4px;
    transform: translateX(-4px);
    position: absolute;
  }
  
  .hour {
    z-index: 20;
    width: 18px;
    height: 18px;
  }
  
  .hour::before {
    height: 70px;
    top: -60px;
  }
  
  .minute {
    z-index: 10;
    background: #adb5bd;
    height: 24px;
    width: 24px;
  }
  
  .minute::before {
    height: 80px;
    top: -75px;
  }
  
  .second {
    background: #fa5252;
    z-index: 30;
    width: 12px;
    height: 12px;
  }
  
  .second::before {
    width: 4px;
    transform: translateX(-2px);
    height: 100px;
    top: -90px;
  }

/* p-2 pie chart */
article.skills {
  width: 500px;
  height: auto;

  p {
    z-index: 2;
    color:  #fff;
    padding: 10px;
    position: relative;
    box-sizing: border-box;
    overflow: hidden;
  }

  .skl {
    

    span:nth-child(1) {
      z-index: -2;
      position: absolute;
      top: 0; bottom: 0; left: 0; right: 0;
      margin: auto;
      background: #fff;
      height: 100%;
      width: 100%;
    }

    span:nth-child(2) {
      z-index: -1;
      position: absolute;
      top: 0; bottom: 0; left: 0; right: 0;
      background: #5E95E8;
      height: 100%;
    }
  }

  div:nth-child(1) {
    

    span:nth-child(2) {
      width: 90%;
      animation-delay: 0;
    }
  }

  div:nth-child(2) {
    

    span:nth-child(2) {
      width: 50%;
      animation-delay: 0.05s;
    }
  }

  div:nth-child(3) {
    

    span:nth-child(2) {
      width: 70%;
      animation-delay: 0.1s;
    }
  }

  div:nth-child(4) {
    
    span:nth-child(2) {
      width: 60%;
      animation-delay: 0.15s;
    }
  }

  div:nth-child(5) {
    

    span:nth-child(2) {
      width: 80%;
      animation-delay: 0.2s;
    }
  }

  div:nth-child(6) {
    

    span:nth-child(2) {
      width: 70%;
      animation-delay: 0.25s;
    }
  }

  div:nth-child(7) {
    

    span:nth-child(2) {
      width: 80%;
      animation-delay: 0.3s;
    }
  }

  div:nth-child(8) {
    

    span:nth-child(2) {
      width: 85%;
      animation-delay: 0.35s;
    }
  }
}
.skills {
  animation: skills 1.25s cubic-bezier(.17,.67,0,1);
}

@keyframes skills {
  0% {
      left: -500px;
      opacity: 0;
  }
  100% {
      left: 0;
      opacity: 1;
  }
}

/* chat-box */
:root {
  --body-bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
  --msger-bg: #fff;
  --border: 2px solid #ddd;
  --left-msg-bg: #ececec;
  --right-msg-bg: #579ffb;
}
.msger {
  display: flex;
  flex-flow: column wrap;
  justify-content: space-between;
  width: 100%;
  max-width: 867px;
  height: calc(100% - 50px);
  /* border: var(--border); */
  border-radius: 5px;
  background: var(--msger-bg);
  box-shadow: 0 15px 15px -5px rgba(0, 0, 0, 0.2);
}

.msger-header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-bottom: var(--border);
  background: #0d214c;
  color: #c9c9c9;
}

.msger-chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}
.msger-chat::-webkit-scrollbar {
  width: 6px;
}
.msger-chat::-webkit-scrollbar-track {
  background: #ddd;
}
.msger-chat::-webkit-scrollbar-thumb {
  background: #bdbdbd;
}
.msg {
  display: flex;
  align-items: flex-end;
  margin-bottom: 10px;
}
.msg:last-of-type {
  margin: 0;
}
.msg-img {
  width: 50px;
  height: 50px;
  margin-right: 10px;
  background: #ddd;
  background-repeat: no-repeat;
  background-position: center;
  background-size: cover;
  border-radius: 50%;
}
.msg-bubble {
  max-width: 450px;
  padding: 15px;
  border-radius: 15px;
  background: var(--left-msg-bg);
}
.msg-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.msg-info-name {
  margin-right: 10px;
  font-weight: bold;
}
.msg-info-time {
  font-size: 0.85em;
}

.left-msg .msg-bubble {
  border-bottom-left-radius: 0;
}

.right-msg {
  flex-direction: row-reverse;
}
.right-msg .msg-bubble {
  background: var(--right-msg-bg);
  color: #fff;
  border-bottom-right-radius: 0;
}
.right-msg .msg-img {
  margin: 0 0 0 10px;
}

.msger-inputarea {
  display: flex;
  padding: 10px;
  border-top: var(--border);
  background: #0d214c;
}
.msger-inputarea * {
  padding: 10px;
  border: none;
  border-radius: 3px;
  font-size: 1em;
}
.msger-input {
  flex: 1;
  background: #122d68;
  gap: 3px;
}
.msger-send-btn {
  margin-left: 10px;
  background: rgb(30, 41, 145);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.23s;
}
.msger-send-btn:hover {
  background: rgb(0, 180, 50);
}

	const msgerForm = get(".msger-inputarea");
	const msgerInput = get(".msger-input");
	const msgerChat = get(".msger-chat");

	const BOT_MSGS = [
	  "Hi, how are you?",
	  "Ohh... I can't understand what you trying to say. Sorry!",
	  "I like to play games... But I don't know how to play!",
	  "Sorry if my answers are not relevant. :))",
	  "I feel sleepy! :("
	];

	// Icons made by Freepik from www.flaticon.com
	const BOT_IMG = "https://image.flaticon.com/icons/svg/327/327779.svg";
	const PERSON_IMG = "https://image.flaticon.com/icons/svg/145/145867.svg";
	const BOT_NAME = "BOT";
	const PERSON_NAME = "Sajad";

	msgerForm.addEventListener("submit", event => {
	  event.preventDefault();

	  const msgText = msgerInput.value;
	  if (!msgText) return;

	  appendMessage(PERSON_NAME, PERSON_IMG, "right", msgText);
	  msgerInput.value = "";

	  botResponse();
	});

	function appendMessage(name, img, side, text) {
	  //   Simple solution for small apps
	  const msgHTML = `
	    <div class="msg ${side}-msg">
	      <div class="msg-img" style="background-image: url(${img})"></div>

	      <div class="msg-bubble">
	        <div class="msg-info">
	          <div class="msg-info-name">${name}</div>
	          <div class="msg-info-time">${formatDate(new Date())}</div>
	        </div>

	        <div class="msg-text">${text}</div>
	      </div>
	    </div>
	  `;

	  msgerChat.insertAdjacentHTML("beforeend", msgHTML);
	  msgerChat.scrollTop += 500;
	}

	function botResponse() {
	  const r = random(0, BOT_MSGS.length - 1);
	  const msgText = BOT_MSGS[r];
	  const delay = msgText.split(" ").length * 100;

	  setTimeout(() => {
	    appendMessage(BOT_NAME, BOT_IMG, "left", msgText);
	  }, delay);
	}

	// Utils
	function get(selector, root = document) {
	  return root.querySelector(selector);
	}

	function formatDate(date) {
	  const h = "0" + date.getHours();
	  const m = "0" + date.getMinutes();

	  return `${h.slice(-2)}:${m.slice(-2)}`;
	}

	function random(min, max) {
	  return Math.floor(Math.random() * (max - min) + min);
	}
</script>
